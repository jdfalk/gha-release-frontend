name: 'Frontend Release Build'
description: 'Build frontend assets for release'
author: 'jdfalk'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'

runs:
  using: 'composite'
  steps:
    - name: Detect frontend directory
      id: frontend-dir
      shell: bash
      run: |
        if [ -f "web/package.json" ]; then
          echo "dir=web" >> "$GITHUB_OUTPUT"
        elif [ -f "frontend/package.json" ]; then
          echo "dir=frontend" >> "$GITHUB_OUTPUT"
        elif [ -f "package.json" ]; then
          echo "dir=." >> "$GITHUB_OUTPUT"
        else
          echo "dir=." >> "$GITHUB_OUTPUT"
        fi

    - name: Build frontend
      continue-on-error: true
      uses: jdfalk/release-frontend-action@5b908f2838643282ce83c261a09b4c98e44b6235 # v1.1.4
      with:
        node-version: ${{ inputs.node-version }}
        working-directory: ${{ steps.frontend-dir.outputs.dir }}
        package-manager: npm
        run-tests: 'true'
        run-lint: 'true'
